execution:
  mode: paper
  broker: ibkr
  account_currency: USD
  rebalance_time_ny: "15:45"
  order_type: MKT
  tif: DAY

ibkr:
  host: ${IBKR_HOST}
  port: ${IBKR_PORT}
  client_id: ${IBKR_CLIENT_ID}
  account: ${IBKR_ACCOUNT}
  readonly: true

risk_controls:
  max_position_weight: 0.20
  max_gross_exposure: 1.00
  max_turnover_per_rebalance: 0.35
  min_cash_buffer: 0.02
  reject_if_missing_prices: true
  kill_switch_enabled: true
